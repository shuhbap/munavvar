<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Munawir & Labeeba - Wedding Invitation</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #FDFBF0;
            padding: 30px 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Background decorations */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 30% 20%, rgba(70, 89, 64, 0.05) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 80%, rgba(70, 89, 64, 0.06) 0%, transparent 60%);
            z-index: 0;
            pointer-events: none;
        }

        .bg-ornament {
            position: fixed;
            font-size: 2rem;
            color: rgba(70, 89, 64, 0.06);
            z-index: 0;
            pointer-events: none;
            font-family: serif;
        }
        .bg-ornament.tl { top: 25px; left: 25px; }
        .bg-ornament.tr { top: 25px; right: 25px; }
        .bg-ornament.bl { bottom: 25px; left: 25px; }
        .bg-ornament.br { bottom: 25px; right: 25px; }

        /* ===== MAIN CARD ===== */
        .card {
            position: relative;
            z-index: 1;
            max-width: 780px;
            width: 100%;
            background: rgba(253, 251, 240, 0.85);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-radius: 40px;
            padding: 50px 40px 40px;
            text-align: center;
            border: 1px solid rgba(70, 89, 64, 0.10);
            box-shadow:
                0 20px 60px rgba(70, 89, 64, 0.08),
                0 0 0 1px rgba(70, 89, 64, 0.04);
            margin-bottom: 30px;
        }

        /* ===== ISLAMIC CALLIGRAPHY IMAGES ===== */
        .calligraphy-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .calligraphy-image {
            max-width: 380px;
            width: 100%;
            height: auto;
            display: block;
        }

        .calligraphy-image.bismillah {
            max-width: 320px;
        }

        .calligraphy-image.barakkallahu {
            max-width: 350px;
        }

        .calligraphy-divider {
            font-size: 1.6rem;
            color: #465940;
            opacity: 0.12;
            letter-spacing: 12px;
            margin: 6px 0;
        }

        /* ===== NAMES ===== */
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.2rem;
            font-weight: 700;
            color: #2c3a28;
            line-height: 1.2;
            margin: 5px 0;
        }

        .ampersand {
            color: #465940;
            font-size: 2.6rem;
            margin: 0 12px;
            display: inline-block;
            opacity: 0.5;
            font-weight: 300;
        }

        .sub-text {
            font-size: 0.9rem;
            color: #5a6a52;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin: 10px 0 20px;
            border-top: 1px solid rgba(70, 89, 64, 0.10);
            border-bottom: 1px solid rgba(70, 89, 64, 0.10);
            padding: 10px 0;
            display: inline-block;
        }

        /* ===== INVITATION LETTER IMAGE ===== */
        .invitation-image {
            width: 100%;
            max-width: 500px;
            margin: 15px auto 20px;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(70, 89, 64, 0.08);
            box-shadow: 0 8px 25px rgba(70, 89, 64, 0.06);
        }

        .invitation-image img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* ===== DETAILS ===== */
        .details {
            background: rgba(70, 89, 64, 0.03);
            border-radius: 20px;
            padding: 25px 20px;
            margin: 20px 0;
            border: 1px solid rgba(70, 89, 64, 0.06);
        }

        .detail-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 6px 0;
            font-size: 1.05rem;
            color: #2c3a28;
            flex-wrap: wrap;
        }

        .detail-row .symbol {
            font-size: 1.2rem;
            min-width: 28px;
            color: #465940;
            opacity: 0.4;
            font-weight: 300;
        }

        .detail-row .label {
            font-weight: 600;
            color: #465940;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            background: rgba(70, 89, 64, 0.06);
            padding: 2px 14px;
            border-radius: 30px;
        }

        .detail-row .value {
            font-weight: 500;
            color: #1e2a1b;
        }

        .venue-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: #465940;
            font-weight: 700;
        }

        /* ===== QR CODE & MAP SECTION ===== */
        .qr-map-container {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
            margin: 25px 0 15px;
            padding: 20px;
            background: rgba(70, 89, 64, 0.02);
            border-radius: 20px;
            border: 1px solid rgba(70, 89, 64, 0.06);
        }

        .qr-box, .map-box {
            flex: 1;
            min-width: 160px;
            max-width: 240px;
            text-align: center;
        }

        .qr-box .label, .map-box .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #465940;
            opacity: 0.5;
            margin-bottom: 8px;
            display: block;
        }

        .qr-box img, .map-box img {
            width: 100%;
            max-width: 180px;
            height: auto;
            border-radius: 12px;
            border: 1px solid rgba(70, 89, 64, 0.06);
            background: white;
            padding: 8px;
        }

        .map-box img {
            max-width: 200px;
            padding: 4px;
        }

        /* ===== FOOTER ===== */
        .footer {
            margin-top: 15px;
            padding-top: 20px;
            border-top: 1px solid rgba(70, 89, 64, 0.08);
        }

        .footer p {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            color: #465940;
            font-weight: 400;
            letter-spacing: 3px;
            opacity: 0.7;
        }

        .footer .sub-footer {
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            color: #8a9a82;
            letter-spacing: 2px;
            margin-top: 6px;
        }

        /* ===== MUSIC PLAYER ===== */
        .music-player {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 100;
            background: rgba(70, 89, 64, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(253, 251, 240, 0.12);
            border-radius: 60px;
            padding: 10px 18px 10px 22px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 32px rgba(70, 89, 64, 0.30);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .music-player:hover {
            transform: scale(1.04);
            border-color: rgba(253, 251, 240, 0.25);
        }

        .music-player .note {
            font-size: 1.3rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .music-player .status {
            font-size: 0.7rem;
            color: #d4dccf;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        .music-player .toggle-icon {
            font-size: 1.1rem;
            color: #FDFBF0;
            background: rgba(253, 251, 240, 0.10);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .music-player .toggle-icon:hover {
            background: rgba(253, 251, 240, 0.20);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 650px) {
            .card { padding: 30px 18px 25px; border-radius: 30px; }
            h1 { font-size: 2.2rem; }
            .ampersand { font-size: 1.8rem; margin: 0 6px; }
            .calligraphy-image { max-width: 260px; }
            .calligraphy-image.bismillah { max-width: 220px; }
            .calligraphy-image.barakkallahu { max-width: 240px; }
            .detail-row { font-size: 0.9rem; gap: 6px; }
            .venue-name { font-size: 1.1rem; }
            .qr-map-container { flex-direction: column; align-items: center; gap: 15px; padding: 15px; }
            .qr-box, .map-box { max-width: 200px; }
            .bg-ornament { display: none; }
            .music-player { bottom: 18px; right: 18px; padding: 8px 12px 8px 16px; }
            .music-player .status { display: none; }
        }

        @media (max-width: 400px) {
            h1 { font-size: 1.6rem; }
            .calligraphy-image { max-width: 200px; }
            .calligraphy-image.bismillah { max-width: 170px; }
            .calligraphy-image.barakkallahu { max-width: 190px; }
            .invitation-image { max-width: 100%; }
        }
    </style>
</head>
<body>

    <!-- ===== BACKGROUND ORNAMENTS ===== -->
    <div class="bg-ornament tl">❧</div>
    <div class="bg-ornament tr">❧</div>
    <div class="bg-ornament bl">❧</div>
    <div class="bg-ornament br">❧</div>

    <!-- ===== MAIN CARD ===== -->
    <div class="card">

        <!-- ISLAMIC CALLIGRAPHY IMAGES -->
        <div class="calligraphy-container">

            <!-- Bismillahir Rahmanir Raheem - Image 1 -->
            <img 
                src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 120'%3E%3Ctext x='50%25' y='50%25' font-size='42' text-anchor='middle' dominant-baseline='central' font-family='Times New Roman, serif' fill='%23465940' opacity='0.6'%3E%uFDFD%3C/text%3E%3Ctext x='50%25' y='80%25' font-size='14' text-anchor='middle' dominant-baseline='central' font-family='Playfair Display, serif' fill='%23465940' opacity='0.4' letter-spacing='4'%3EBismillahir Rahmanir Raheem%3C/text%3E%3C/svg%3E"
                alt="Bismillahir Rahmanir Raheem"
                class="calligraphy-image bismillah"
            />

            <div class="calligraphy-divider">❧ ❧ ❧</div>

            <!-- NAMES -->
            <h1>
                MUNAWIR <span class="ampersand">&amp;</span> LABEEBA
            </h1>

            <div class="sub-text">— Invite You to Celebrate —</div>

            <div class="calligraphy-divider">❧ ❧ ❧</div>

            <!-- Barakkallahu Lakuma - Image 2 -->
            <img 
                src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 100'%3E%3Ctext x='50%25' y='40%25' font-size='36' text-anchor='middle' dominant-baseline='central' font-family='Times New Roman, serif' fill='%23465940' opacity='0.5'%3E%u0628%u0627%u0631%u0643%20%u0627%u0644%u0644%u0647%20%u0644%u0643%u0645%u0627%3C/text%3E%3Ctext x='50%25' y='75%25' font-size='14' text-anchor='middle' dominant-baseline='central' font-family='Playfair Display, serif' fill='%23465940' opacity='0.4' letter-spacing='4'%3EBarakkallahu Lakuma%3C/text%3E%3C/svg%3E"
                alt="Barakkallahu Lakuma"
                class="calligraphy-image barakkallahu"
            />

        </div>

        <div class="calligraphy-divider">❧ ❧ ❧</div>

        <!-- INVITATION LETTER IMAGE -->
        <div class="invitation-image">
            <!-- REPLACE src WITH YOUR INVITATION LETTER IMAGE URL -->
            <img src="https://via.placeholder.com/800x400/FDFBF0/465940?text=Invitation+Letter+Image" alt="Invitation Letter" />
        </div>

        <!-- DETAILS -->
        <div class="details">

            <div class="detail-row">
                <span class="symbol">◈</span>
                <span class="label">Date</span>
                <span class="value"><strong>Sunday, 19 July 2026</strong></span>
            </div>

            <div class="detail-row">
                <span class="symbol">◈</span>
                <span class="label">Time</span>
                <span class="value"><strong>6:30 PM onwards</strong></span>
            </div>

            <div class="detail-row">
                <span class="symbol">◈</span>
                <span class="label">Venue</span>
                <span class="value venue-name">VISTA CONVENTION CENTER</span>
            </div>

            <div class="detail-row" style="font-size:0.9rem; color:#5a6a52; padding-top:2px;">
                <span class="symbol">◈</span>
                <span>Vengad, Kerala</span>
            </div>

        </div>

        <!-- QR CODE & MAP -->
        <div class="qr-map-container">

            <div class="qr-box">
                <span class="label">◈ Place QR ◈</span>
                <!-- REPLACE src WITH YOUR QR CODE IMAGE URL -->
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=YourPlaceAddressHere" alt="Place QR Code" />
            </div>

            <div class="map-box">
                <span class="label">◈ Location Map ◈</span>
                <!-- REPLACE src WITH YOUR MAP IMAGE URL -->
                <img src="https://maps.googleapis.com/maps/api/staticmap?center=Vengad,Kerala&zoom=13&size=300x200&markers=color:green%7CVengad,Kerala&key=YOUR_API_KEY" alt="Location Map" />
            </div>

        </div>

        <!-- FOOTER -->
        <div class="footer">
            <p>Complements Family &amp; Friends</p>
            <div class="sub-footer">❧ ❧ ❧</div>
        </div>

    </div>

    <!-- ===== MUSIC PLAYER ===== -->
    <div class="music-player" id="musicPlayer">
        <span class="note">♫</span>
        <span class="status" id="musicStatus">Playing</span>
        <span class="toggle-icon" id="musicToggle">⏸</span>
    </div>

    <!-- ===== AUDIO (Islamic Nasheed) ===== -->
    <audio id="bgMusic" loop preload="auto">
        <!-- REPLACE WITH YOUR ISLAMIC NASHEED MP3 URL -->
        <source src="https://www.islamcan.com/audio/nasheed/ya-nabiy-salam-alayka.mp3" type="audio/mpeg">
        <source src="https://archive.org/download/nasheedcollection/07%20Qamaran.mp3" type="audio/mpeg">
        Your browser does not support audio.
    </audio>

    <script>
        // =========================
        // MUSIC PLAYER
        // =========================
        const audio = document.getElementById('bgMusic');
        const player = document.getElementById('musicPlayer');
        const statusEl = document.getElementById('musicStatus');
        const toggleEl = document.getElementById('musicToggle');

        let isPlaying = false;

        function tryAutoPlay() {
            audio.play().then(() => {
                isPlaying = true;
                statusEl.textContent = 'Playing';
                toggleEl.textContent = '⏸';
            }).catch(() => {
                isPlaying = false;
                statusEl.textContent = 'Paused';
                toggleEl.textContent = '▶';
            });
        }

        player.addEventListener('click', function(e) {
            if (e.target === toggleEl) return;

            if (isPlaying) {
                audio.pause();
                isPlaying = false;
                statusEl.textContent = 'Paused';
                toggleEl.textContent = '▶';
            } else {
                audio.play().then(() => {
                    isPlaying = true;
                    statusEl.textContent = 'Playing';
                    toggleEl.textContent = '⏸';
                }).catch(() => {});
            }
        });

        toggleEl.addEventListener('click', function(e) {
            e.stopPropagation();
            if (isPlaying) {
                audio.pause();
                isPlaying = false;
                statusEl.textContent = 'Paused';
                toggleEl.textContent = '▶';
            } else {
                audio.play().then(() => {
                    isPlaying = true;
                    statusEl.textContent = 'Playing';
                    toggleEl.textContent = '⏸';
                }).catch(() => {});
            }
        });

        document.addEventListener('click', function initAudio() {
            tryAutoPlay();
            document.removeEventListener('click', initAudio);
        }, { once: true });

        window.addEventListener('load', function() {
            setTimeout(tryAutoPlay, 600);
        });
    </script>

</body>
</html>
