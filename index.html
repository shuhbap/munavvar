<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUNAWIR & LABEEBA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #fce4ec, #f8e8e0);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            max-width: 600px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            padding: 40px 30px;
            text-align: center;
            transition: 0.3s;
        }
        .card:hover {
            transform: scale(1.01);
        }
        .badge {
            background: #d4a373;
            color: white;
            display: inline-block;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 14px;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }
        h1 {
            font-size: 2.6rem;
            color: #5a2d2d;
            margin-bottom: 5px;
        }
        .sub-title {
            font-size: 1.1rem;
            color: #7a4a4a;
            margin-bottom: 25px;
            border-top: 2px dashed #e8d5c4;
            border-bottom: 2px dashed #e8d5c4;
            padding: 12px 0;
        }
        .names {
            font-size: 2rem;
            font-weight: bold;
            color: #8b3e3e;
            margin: 10px 0;
        }
        .names span {
            color: #d4a373;
            margin: 0 8px;
        }
        .detail {
            background: #fcf6f1;
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            line-height: 1.9;
            font-size: 1.05rem;
            color: #3d2b2b;
        }
        .detail i {
            font-style: normal;
            background: #d4a373;
            color: white;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-right: 6px;
        }
        .rsvp-btn {
            display: inline-block;
            background: #8b3e3e;
            color: white;
            padding: 14px 45px;
            border-radius: 60px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            margin-top: 10px;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }
        .rsvp-btn:hover {
            background: #5a2d2d;
            transform: scale(1.05);
        }
        .footer {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #999;
        }
        @media (max-width: 480px) {
            h1 { font-size: 2rem; }
            .names { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="badge">✨ സ്നേഹപൂർവ്വം ക്ഷണിക്കുന്നു ✨</div>
        <h1>വിവാഹം</h1>
        <div class="sub-title">
            <span style="font-size:1.3rem;">❤️</span> ഞങ്ങൾ വിവാഹിതരാകുന്നു <span style="font-size:1.3rem;">❤️</span>
        </div>

        <div class="names">
            <span id="groomName">വരൻ</span> 
            <span>✧</span> 
            <span id="brideName">വധു</span>
        </div>

        <div class="detail">
            <p><i>📅</i> <span id="weddingDate">2026, ജൂൺ 28</span></p>
            <p><i>⏰</i> <span id="weddingTime">വൈകീട്ട് 6:30 മണി</span></p>
            <p><i>📍</i> <span id="weddingVenue">ഓഡിറ്റോറിയം, കോഴിക്കോട്</span></p>
        </div>

        <a href="#" class="rsvp-btn" id="rsvpBtn">✅ RSVP രജിസ്റ്റർ ചെയ്യുക</a>
        <p style="margin-top:12px; font-size:0.9rem; color:#7a4a4a;">
            🙏 നിങ്ങളുടെ സാന്നിദ്ധ്യമാണ് ഞങ്ങളുടെ ആഗ്രഹം
        </p>
        <div class="footer">
            <!-- Vercel + GitHub badge -->
            <span>🚀 Hosted with ❤️ on Vercel</span>
        </div>
    </div>

    <script>
        // RSVP ബട്ടൺ ക്ലിക്ക് ചെയ്യുമ്പോൾ അറിയിപ്പ്
        document.getElementById('rsvpBtn').addEventListener('click', function(e) {
            e.preventDefault();
            alert('🎉 നന്ദി! RSVP ലിങ്ക് ഉടൻ ലഭ്യമാകും.\nഇപ്പോൾ WhatsApp വഴി അറിയിക്കാം: +91 9876543210');
        });

        // നിങ്ങൾക്ക് ഇവിടെ പേരുകളും തീയതിയും മാറ്റാം
        // document.getElementById('groomName').innerText = 'അഭി';
        // document.getElementById('brideName').innerText = 'അനു';
    </script>
</body>
  </html>
