<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Munawir & Labeeba - Wedding Invitation</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet"/>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #FDFBF0;
            padding: 30px 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Background decorations */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 30% 20%, rgba(70, 89, 64, 0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 80%, rgba(70, 89, 64, 0.05) 0%, transparent 60%);
            z-index: 0;
            pointer-events: none;
        }

        .bg-ornament {
            position: fixed;
            font-size: 1.6rem;
            color: rgba(70, 89, 64, 0.05);
            z-index: 0;
            pointer-events: none;
            font-family: serif;
        }
        .bg-ornament.tl { top: 30px; left: 30px; }
        .bg-ornament.tr { top: 30px; right: 30px; }
        .bg-ornament.bl { bottom: 30px; left: 30px; }
        .bg-ornament.br { bottom: 30px; right: 30px; }

        /* ===== MAIN CARD ===== */
        .card {
            position: relative;
            z-index: 1;
            max-width: 760px;
            width: 100%;
            background: rgba(253, 251, 240, 0.88);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-radius: 36px;
            padding: 48px 38px 36px;
            text-align: center;
            border: 1px solid rgba(70, 89, 64, 0.08);
            box-shadow:
                0 20px 60px rgba(70, 89, 64, 0.06),
                0 0 0 1px rgba(70, 89, 64, 0.03);
            margin-bottom: 30px;
        }

        /* ===== ISLAMIC CALLIGRAPHY PNG IMAGES ===== */
        .calligraphy-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            margin-bottom: 8px;
        }

        .calligraphy-img {
            max-width: 400px;
            width: 100%;
            height: auto;
            display: block;
        }

        .calligraphy-img.bismillah {
            max-width: 360px;
        }

        .calligraphy-img.barakkallahu {
            max-width: 380px;
        }

        .divider-symbol {
            font-size: 1.4rem;
            color: #465940;
            opacity: 0.10;
            letter-spacing: 12px;
            margin: 6px 0 12px;
        }

        /* ===== NAMES - Premium Standard ===== */
        .names-container {
            margin: 8px 0 4px;
        }

        .groom-name {
            font-family: 'Cormorant Garamond', 'Playfair Display', serif;
            font-size: 3.4rem;
            font-weight: 700;
            color: #2c3a28;
            letter-spacing: 3px;
            line-height: 1.1;
        }

        .ampersand {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.4rem;
            color: #465940;
            opacity: 0.35;
            margin: 2px 14px;
            display: inline-block;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .bride-name {
            font-family: 'Cormorant Garamond', 'Playfair Display', serif;
            font-size: 3.4rem;
            font-weight: 700;
            color: #2c3a28;
            letter-spacing: 3px;
            line-height: 1.1;
        }

        .sub-text {
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            color: #6a7a62;
            font-weight: 300;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin: 8px 0 12px;
            border-top: 1px solid rgba(70, 89, 64, 0.08);
            border-bottom: 1px solid rgba(70, 89, 64, 0.08);
            padding: 8px 0;
            display: inline-block;
        }

        /* ===== INVITATION LETTER IMAGE ===== */
        .invitation-image {
            width: 100%;
            max-width: 480px;
            margin: 12px auto 18px;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid rgba(70, 89, 64, 0.06);
            box-shadow: 0 6px 20px rgba(70, 89, 64, 0.04);
        }

        .invitation-image img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* ===== DETAILS ===== */
        .details {
            background: rgba(70, 89, 64, 0.02);
            border-radius: 18px;
            padding: 20px 18px;
            margin: 16px 0;
            border: 1px solid rgba(70, 89, 64, 0.05);
        }

        .detail-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 5px 0;
            font-size: 1rem;
            color: #2c3a28;
            flex-wrap: wrap;
        }

        .detail-row .symbol {
            font-size: 1rem;
            min-width: 24px;
            color: #465940;
            opacity: 0.30;
            font-weight: 300;
        }

        .detail-row .label {
            font-weight: 500;
            color: #465940;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            background: rgba(70, 89, 64, 0.05);
            padding: 2px 12px;
            border-radius: 30px;
        }

        .detail-row .value {
            font-weight: 500;
            color: #1e2a1b;
        }

        .venue-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.3rem;
            color: #465940;
            font-weight: 600;
        }

        /* ===== QR CODE & MAP ===== */
        .qr-map-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin: 20px 0 12px;
            padding: 18px;
            background: rgba(70, 89, 64, 0.015);
            border-radius: 18px;
            border: 1px solid rgba(70, 89, 64, 0.04);
        }

        .qr-box, .map-box {
            flex: 1;
            min-width: 150px;
            max-width: 220px;
            text-align: center;
        }

        .qr-box .label, .map-box .label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: #465940;
            opacity: 0.35;
            margin-bottom: 6px;
            display: block;
            font-weight: 400;
        }

        .qr-box img, .map-box img {
            width: 100%;
            max-width: 160px;
            height: auto;
            border-radius: 10px;
            border: 1px solid rgba(70, 89, 64, 0.05);
            background: white;
            padding: 6px;
        }

        .map-box img {
            max-width: 180px;
            padding: 3px;
        }

        /* ===== FOOTER - Subtle & Small ===== */
        .footer {
            margin-top: 10px;
            padding-top: 16px;
            border-top: 1px solid rgba(70, 89, 64, 0.06);
        }

        .footer p {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.95rem;
            color: #465940;
            font-weight: 400;
            letter-spacing: 2.5px;
            opacity: 0.35;
        }

        .footer .sub-footer {
            font-family: 'Inter', sans-serif;
            font-size: 0.55rem;
            color: #8a9a82;
            letter-spacing: 2px;
            margin-top: 4px;
            opacity: 0.30;
        }

        /* ===== MUSIC PLAYER ===== */
        .music-player {
            position: fixed;
            bottom: 28px;
            right: 28px;
            z-index: 100;
            background: rgba(70, 89, 64, 0.88);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(253, 251, 240, 0.08);
            border-radius: 50px;
            padding: 8px 16px 8px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 6px 24px rgba(70, 89, 64, 0.20);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .music-player:hover {
            transform: scale(1.03);
            border-color: rgba(253, 251, 240, 0.20);
        }

        .music-player .note {
            font-size: 1.1rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.12); }
        }

        .music-player .status {
            font-size: 0.6rem;
            color: #d4dccf;
            font-weight: 300;
            letter-spacing: 0.5px;
            opacity: 0.7;
        }

        .music-player .toggle-icon {
            font-size: 1rem;
            color: #FDFBF0;
            background: rgba(253, 251, 240, 0.08);
            border-radius: 50%;
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .music-player .toggle-icon:hover {
            background: rgba(253, 251, 240, 0.16);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 650px) {
            .card { padding: 28px 16px 22px; border-radius: 28px; }
            .groom-name, .bride-name { font-size: 2.4rem; }
            .ampersand { font-size: 1.8rem; margin: 0 6px; }
            .calligraphy-img.bismillah { max-width: 280px; }
            .calligraphy-img.barakkallahu { max-width: 300px; }
            .detail-row { font-size: 0.88rem; gap: 4px; }
            .venue-name { font-size: 1.1rem; }
            .qr-map-container { flex-direction: column; align-items: center; gap: 12px; padding: 12px; }
            .qr-box, .map-box { max-width: 180px; }
            .bg-ornament { display: none; }
            .music-player { bottom: 16px; right: 16px; padding: 6px 12px 6px 16px; }
            .music-player .status { display: none; }
            .footer p { font-size: 0.8rem; }
        }

        @media (max-width: 400px) {
            .groom-name, .bride-name { font-size: 1.8rem; letter-spacing: 1px; }
            .calligraphy-img.bismillah { max-width: 220px; }
            .calligraphy-img.barakkallahu { max-width: 240px; }
            .invitation-image { max-width: 100%; }
            .card { padding: 20px 12px 18px; }
            .footer p { font-size: 0.7rem; }
        }
    </style>
</head>
<body>

    <!-- ===== BACKGROUND ORNAMENTS ===== -->
    <div class="bg-ornament tl">❧</div>
    <div class="bg-ornament tr">❧</div>
    <div class="bg-ornament bl">❧</div>
    <div class="bg-ornament br">❧</div>

    <!-- ===== MAIN CARD ===== -->
    <div class="card">

        <!-- ISLAMIC CALLIGRAPHY PNG IMAGES -->
        <div class="calligraphy-container">
            <!-- Bismillahir Rahmanir Raheem - PNG -->
            <img 
                src="https://xenocdn.xenocdn.workers.dev/79558c6a.jpeg" 
                alt="Bismillahir Rahmanir Raheem" 
                class="calligraphy-img bismillah"
            />
        </div>

        <div class="divider-symbol">❧ ❧ ❧</div>

        <!-- NAMES - Premium Standard -->
        <div class="names-container">
            <div class="groom-name">MUNAWIR</div>
            <div class="ampersand">&amp;</div>
            <div class="bride-name">LABEEBA</div>
        </div>

        <div class="sub-text">— Invite You to Celebrate —</div>

        <div class="divider-symbol">❧ ❧ ❧</div>

        <!-- BARAKALLAHU - PNG -->
        <div class="calligraphy-container">
            <img 
                src="https://xenocdn.xenocdn.workers.dev/79558c6a.jpeg" 
                alt="Barakkallahu Lakuma" 
                class="calligraphy-img barakkallahu"
            />
        </div>

        <div class="divider-symbol">❧ ❧ ❧</div>

        <!-- INVITATION LETTER IMAGE -->
        <div class="invitation-image">
            <!-- REPLACE src WITH YOUR INVITATION LETTER IMAGE URL -->
            <img src="https://xenocdn.xenocdn.workers.dev/bcbf2003.jpeg" alt="Invitation Letter" />
        </div>

        <!-- DETAILS -->
        <div class="details">

            <div class="detail-row">
                <span class="symbol">◈</span>
                <span class="label">Date</span>
                <span class="value"><strong>Sunday, 19 July 2026</strong></span>
            </div>

            <div class="detail-row">
                <span class="symbol">◈</span>
                <span class="label">Time</span>
                <span class="value"><strong>6:30 PM onwards</strong></span>
            </div>

            <div class="detail-row">
                <span class="symbol">◈</span>
                <span class="label">Venue</span>
                <span class="value venue-name">VISTA CONVENTION CENTER</span>
            </div>

            <div class="detail-row" style="font-size:0.85rem; color:#5a6a52; padding-top:2px;">
                <span class="symbol">◈</span>
                <span>Vengad, Kerala</span>
            </div>

        </div>

        <!-- QR CODE & MAP -->
        <div class="qr-map-container">

            <div class="qr-box">
                <span class="label">◈ Place QR ◈</span>
                <!-- REPLACE src WITH YOUR QR CODE IMAGE URL -->
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=YourPlaceAddressHere" alt="Place QR Code" />
            </div>

            <div class="map-box">
                <span class="label">◈ Location Map ◈</span>
                <!-- REPLACE src WITH YOUR MAP IMAGE URL -->
                <img src="https://maps.googleapis.com/maps/api/staticmap?center=Vengad,Kerala&zoom=13&size=300x200&markers=color:green%7CVengad,Kerala&key=YOUR_API_KEY" alt="Location Map" />
            </div>

        </div>

        <!-- FOOTER - Subtle & Small -->
        <div class="footer">
            <p>Complements Family &amp; Friends</p>
            <div class="sub-footer">❧ ❧ ❧</div>
        </div>

    </div>

    <!-- ===== MUSIC PLAYER ===== -->
    <div class="music-player" id="musicPlayer">
        <span class="note">♫</span>
        <span class="status" id="musicStatus">Playing</span>
        <span class="toggle-icon" id="musicToggle">⏸</span>
    </div>

    <!-- ===== AUDIO (Islamic Nasheed) ===== -->
    <audio id="bgMusic" loop preload="auto">
        <!-- REPLACE WITH YOUR ISLAMIC NASHEED MP3 URL -->
        <source src="https://xenocdn.xenocdn.workers.dev/36a65906.mp4" type="audio/mpeg">
        <source src="https://archive.org/download/nasheedcollection/07%20Qamaran.mp3" type="audio/mpeg">
        Your browser does not support audio.
    </audio>

    <script>
        // =========================
        // MUSIC PLAYER
        // =========================
        const audio = document.getElementById('bgMusic');
        const player = document.getElementById('musicPlayer');
        const statusEl = document.getElementById('musicStatus');
        const toggleEl = document.getElementById('musicToggle');

        let isPlaying = false;

        function tryAutoPlay() {
            audio.play().then(() => {
                isPlaying = true;
                statusEl.textContent = 'Playing';
                toggleEl.textContent = '⏸';
            }).catch(() => {
                isPlaying = false;
                statusEl.textContent = 'Paused';
                toggleEl.textContent = '▶';
            });
        }

        player.addEventListener('click', function(e) {
            if (e.target === toggleEl) return;

            if (isPlaying) {
                audio.pause();
                isPlaying = false;
                statusEl.textContent = 'Paused';
                toggleEl.textContent = '▶';
            } else {
                audio.play().then(() => {
                    isPlaying = true;
                    statusEl.textContent = 'Playing';
                    toggleEl.textContent = '⏸';
                }).catch(() => {});
            }
        });

        toggleEl.addEventListener('click', function(e) {
            e.stopPropagation();
            if (isPlaying) {
                audio.pause();
                isPlaying = false;
                statusEl.textContent = 'Paused';
                toggleEl.textContent = '▶';
            } else {
                audio.play().then(() => {
                    isPlaying = true;
                    statusEl.textContent = 'Playing';
                    toggleEl.textContent = '⏸';
                }).catch(() => {});
            }
        });

        document.addEventListener('click', function initAudio() {
            tryAutoPlay();
            document.removeEventListener('click', initAudio);
        }, { once: true });

        window.addEventListener('load', function() {
            setTimeout(tryAutoPlay, 600);
        });
    </script>

</body>
    </html>
